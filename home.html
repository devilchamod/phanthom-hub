<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Attachment with Edit Icon</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg-overlay: rgba(15, 23, 42, 0.6);
      --card-radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f8fafc;
      margin: 0;
    }

    /* Attachment Card Container */
    .attachment-card {
      position: relative;
      width: 280px;
      height: 180px;
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      background-color: #e2e8f0;
    }

    .attachment-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Overlay Trigger Bar */
    .card-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: var(--bg-overlay);
      backdrop-filter: blur(4px);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ffffff;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .icon-btn:hover {
      background: rgba(15, 23, 42, 0.85);
      transform: scale(1.05);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Editor Toolbar Drawer/Menu (Toggled via JS) */
    .edit-menu {
      position: absolute;
      bottom: -60px; /* Hidden off-screen by default */
      left: 0;
      right: 0;
      height: 52px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 12px;
      transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .edit-menu.open {
      bottom: 0; /* Slides up when active */
    }

    .menu-item {
      background: transparent;
      border: none;
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      transition: color 0.2s, background-color 0.2s;
    }

    .menu-item:hover {
      color: #ffffff;
      background-color: rgba(255, 255, 255, 0.1);
    }

    .menu-item svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Close button inside menu */
    .menu-item.close-btn {
      color: #ef4444;
    }
    .menu-item.close-btn:hover {
      background-color: rgba(239, 68, 68, 0.15);
    }
  </style>
</head>
<body>

  <!-- Attachment Card -->
  <div class="attachment-card">
    <img src="https://picsum.photos/400/300" alt="Attachment Preview">

    <!-- Top Right Actions -->
    <div class="card-actions">
      <!-- Edit Icon Button -->
      <button class="icon-btn" id="editBtn" aria-label="Edit Image" title="Edit Image">
        <!-- Pencil/Edit SVG Icon -->
        <svg viewBox="0 0 24 24">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
      </button>
    </div>

    <!-- Slide-Up Edit Toolbar -->
    <div class="edit-menu" id="editMenu">
      <!-- Crop Feature Button -->
      <button class="menu-item" title="Crop Image">
        <svg viewBox="0 0 24 24">
          <path d="M6 2v14a2 2 0 0 0 2 2h14"></path>
          <path d="M18 22V8a2 2 0 0 0-2-2H2"></path>
        </svg>
        <span>Crop</span>
      </button>

      <!-- Mark Feature Button -->
      <button class="menu-item" title="Add Marker / Text">
        <svg viewBox="0 0 24 24">
          <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
          <path d="M2 2l7.586 7.586"></path>
          <circle cx="11" cy="11" r="2"></circle>
        </svg>
        <span>Mark</span>
      </button>

      <!-- Draw Feature Button -->
      <button class="menu-item" title="Draw / Freehand">
        <svg viewBox="0 0 24 24">
          <path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.375-9.375z"></path>
          <path d="M14 6l4 4"></path>
          <path d="M4 20c2.5 0 3-1.5 5-1.5s2.5 1.5 5 1.5 3-1.5 5-1.5"></path>
        </svg>
        <span>Draw</span>
      </button>

      <!-- Close Menu Button -->
      <button class="menu-item close-btn" id="closeMenuBtn" title="Close Toolbar">
        <svg viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        <span>Done</span>
      </button>
    </div>
  </div>

  <script>
    const editBtn = document.getElementById('editBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const editMenu = document.getElementById('editMenu');

    // Toggle menu open/close
    editBtn.addEventListener('click', () => {
      editMenu.classList.add('open');
    });

    closeMenuBtn.addEventListener('click', () => {
      editMenu.classList.remove('open');
    });
  </script>
</body>
</html>
