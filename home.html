<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Hub - Chat</title>
    <!-- Include Supabase Library ONCE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0b0c10; color: #f5f5f7; height: 100vh; display: flex; overflow: hidden; }

        .sidebar {
            width: 260px;
            background: #121420;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }

        .brand {
            padding: 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #00ffcc;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .channels-list { padding: 1rem 0.5rem; flex: 1; }
        .channel-item {
            padding: 0.6rem 1rem;
            border-radius: 6px;
            color: #8b92b6;
            cursor: pointer;
            margin-bottom: 0.2rem;
            font-weight: 500;
        }
        .channel-item:hover, .channel-item.active { background: rgba(93, 101, 255, 0.15); color: #00ffcc; }

        .user-profile {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; }
        .btn-logout { background: none; border: none; color: #ff5555; cursor: pointer; font-size: 0.8rem; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0b0c10; }
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 600;
            color: #fff;
        }

        .messages-box { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        
        .message-card { display: flex; gap: 0.75rem; align-items: flex-start; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .msg-header { display: flex; gap: 0.5rem; align-items: baseline; }
        .msg-author { font-size: 0.85rem; font-weight: 600; color: #00ffcc; }
        .msg-time { font-size: 0.7rem; color: #8b92b6; }
        .msg-body { font-size: 0.92rem; color: #d0d4e4; margin-top: 0.2rem; word-break: break-word; }

        .input-box { padding: 1rem 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-form { display: flex; gap: 0.5rem; }
        .chat-input {
            flex: 1;
            background: #121420;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #fff;
            outline: none;
        }
        .btn-send {
            background: #5d65ff;
            border: none;
            color: #fff;
            padding: 0 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">⚡ PHANTOM HUB</div>
        <div class="channels-list">
            <div class="channel-item active" onclick="switchChannel('general', this)"># general</div>
            <div class="channel-item" onclick="switchChannel('gaming', this)"># gaming</div>
            <div class="channel-item" onclick="switchChannel('announcements', this)"># announcements</div>
        </div>
        <div class="user-profile">
            <img id="myAvatar" class="avatar" src="" alt="pfp">
            <div class="user-info">
                <div class="user-name" id="myName">User</div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="channelHeader"># general</div>
        <div class="messages-box" id="msgBox"></div>
        <div class="input-box">
            <form class="chat-form" id="chatForm">
                <input type="text" id="msgInput" class="chat-input" placeholder="Message #general..." autocomplete="off">
                <button type="submit" class="btn-send">Send</button>
            </form>
        </div>
    </div>

    <script>
        // 1. Check User Session
        const savedUser = localStorage.getItem('phantom_user');
        if (!savedUser) { window.location.href = "index.html"; }
        let currentUser = JSON.parse(savedUser);

        document.getElementById('myName').innerText = currentUser.nickname || currentUser.username;
        document.getElementById('myAvatar').src = currentUser.pfp_url || 'https://via.placeholder.com/42/1a1d2e/00ffcc?text=U';

        // 2. SINGLE DECLARATION ONLY
        const SUPABASE_URL = "https://boxrmxujhzzojepneliq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_iCjgpDWwHTZNqVrKPd44nw_bNx4bciG"; 

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentChannel = "general";
        const msgBox = document.getElementById('msgBox');
        const chatForm = document.getElementById('chatForm');
        const msgInput = document.getElementById('msgInput');
        const channelHeader = document.getElementById('channelHeader');

        // Fetch Messages
        async function loadMessages() {
            msgBox.innerHTML = '';
            const { data } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('channel', currentChannel)
                .order('created_at', { ascending: true })
                .limit(50);

            if (data) {
                data.forEach(m => appendMessage(m));
                msgBox.scrollTop = msgBox.scrollHeight;
            }
        }

        function appendMessage(m) {
            const name = m.nickname || m.username;
            const pfp = m.pfp_url || 'https://via.placeholder.com/42/1a1d2e/8b92b6?text=OP';
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const div = document.createElement('div');
            div.className = 'message-card';
            div.innerHTML = `
                <img src="${escapeHtml(pfp)}" class="msg-avatar" alt="pfp">
                <div>
                    <div class="msg-header">
                        <span class="msg-author">${escapeHtml(name)}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="msg-body">${escapeHtml(m.message)}</div>
                </div>
            `;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        // Realtime Subscriptions
        supabaseClient
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.channel === currentChannel) {
                    appendMessage(payload.new);
                }
            })
            .subscribe();

        // Send Message
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text) return;

            msgInput.value = '';

            await supabaseClient
                .from('messages')
                .insert([{
                    username: currentUser.username,
                    nickname: currentUser.nickname,
                    pfp_url: currentUser.pfp_url,
                    message: text,
                    channel: currentChannel
                }]);
        });

        function switchChannel(channelName, el) {
            currentChannel = channelName;
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            channelHeader.innerText = `# ${channelName}`;
            msgInput.placeholder = `Message #${channelName}...`;
            loadMessages();
        }

        function logout() {
            localStorage.removeItem('phantom_user');
            window.location.href = "index.html";
        }

        function escapeHtml(text) {
            return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '';
        }

        loadMessages();
    </script>
</body>
</html>
