<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM // HUB - TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #05050a; border-left: 1px solid rgba(255, 0, 60, 0.1); }
        ::-webkit-scrollbar-thumb { background: #1a1d2e; border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff003c; box-shadow: 0 0 10px #ff003c; }

        body {
            background: #05050a;
            color: #e0e6ed;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 0, 60, 0.05) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .icon-bar {
            width: 70px;
            background: rgba(10, 10, 16, 0.95);
            border-right: 1px solid rgba(255, 0, 60, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.2rem 0;
            gap: 1.2rem;
            z-index: 10;
        }

        .nav-icon {
            width: 48px;
            height: 48px;
            background: #0d0e17;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #7a8b9e;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(0 0, 85% 0, 100% 15%, 100% 100%, 15% 100%, 0 85%);
        }

        .nav-icon:hover, .nav-icon.active {
            background: rgba(255, 0, 60, 0.15);
            color: #ff003c;
            border-color: #ff003c;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.5);
            transform: scale(1.05);
        }

        .nav-icon.settings-btn { margin-top: auto; }

        .sidebar {
            width: 260px;
            background: rgba(12, 13, 20, 0.85);
            border-right: 1px solid rgba(255, 0, 60, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .brand {
            padding: 1.25rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            color: #ff003c;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 0, 60, 0.2);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.6);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #00f3ff;
            padding: 1.2rem 1rem 0.4rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .list-container { padding: 0 0.5rem; flex: 1; overflow-y: auto; }

        .item-btn {
            padding: 0.65rem 0.9rem;
            color: #8a99ad;
            cursor: pointer;
            margin-bottom: 0.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: all 0.2s;
            clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%);
        }

        .item-btn:hover, .item-btn.active {
            background: rgba(0, 243, 255, 0.08);
            color: #00f3ff;
            border-color: rgba(0, 243, 255, 0.4);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
            padding-left: 1.2rem;
        }

        .status-dot { width: 8px; height: 8px; background: #333; transform: rotate(45deg); }
        .status-dot.online { background: #ff003c; box-shadow: 0 0 8px #ff003c; }

        .user-profile {
            padding: 0.8rem 1rem;
            background: rgba(5, 5, 10, 0.9);
            border-top: 1px solid rgba(255, 0, 60, 0.2);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 38px;
            height: 38px;
            object-fit: cover;
            clip-path: polygon(0 0, 80% 0, 100% 20%, 100% 100%, 20% 100%, 0 80%);
        }

        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-weight: 700; color: #fff; font-size: 0.95rem; letter-spacing: 1px; }
        .btn-logout { background: none; border: none; color: #ff003c; cursor: pointer; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }

        .main-content { flex: 1; display: flex; flex-direction: column; background: transparent; position: relative; }
        
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 0, 60, 0.2);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 16, 0.6);
        }

        .view-panel { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 60px); }
        .hidden { display: none !important; }

        .messages-box { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.2rem; }

        /* Dynamic Border Highlight per User */
        .message-card {
            position: relative;
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            background: rgba(15, 16, 25, 0.7);
            padding: 0.85rem 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            clip-path: polygon(0 0, 98% 0, 100% 15%, 100% 100%, 0 100%);
            transition: border 0.3s;
        }

        .msg-avatar {
            width: 38px;
            height: 38px;
            object-fit: cover;
            clip-path: polygon(0 0, 80% 0, 100% 20%, 100% 100%, 20% 100%, 0 80%);
        }

        .msg-header { display: flex; gap: 0.6rem; align-items: baseline; }
        .msg-author { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; }
        .msg-time { font-size: 0.7rem; color: #5a697a; font-weight: 600; }
        .msg-body { font-size: 1rem; color: #d1dce8; margin-top: 0.2rem; word-break: break-word; font-weight: 500; }
        .msg-img { max-width: 280px; max-height: 220px; border: 1px solid #ff003c; margin-top: 0.6rem; display: block; }

        .reply-preview-tag {
            background: rgba(255, 255, 255, 0.05);
            border-left: 2px solid #00f3ff;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            color: #7a8b9e;
            margin-bottom: 0.4rem;
        }

        .msg-actions {
            display: none;
            position: absolute;
            right: 12px;
            top: 10px;
            gap: 8px;
            background: #0d0e17;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .message-card:hover .msg-actions { display: flex; }
        .act-btn { background: none; border: none; color: #00f3ff; cursor: pointer; font-size: 0.75rem; font-weight: 700; }
        .act-btn:hover { text-shadow: 0 0 5px #00f3ff; }

        .typing-indicator { font-size: 0.8rem; color: #00f3ff; padding: 0 1.5rem 0.5rem; min-height: 1.2rem; font-style: italic; font-weight: 600; }

        /* Input Bar & Controls */
        .input-box { padding: 1rem 1.5rem; border-top: 1px solid rgba(255, 0, 60, 0.2); background: rgba(8, 9, 14, 0.9); }
        .chat-form { display: flex; gap: 0.6rem; align-items: center; }
        
        .chat-input {
            flex: 1;
            background: rgba(18, 20, 32, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.85rem 1.2rem;
            color: #fff;
            outline: none;
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            clip-path: polygon(0 0, 98% 0, 100% 20%, 100% 100%, 2% 100%, 0 80%);
        }

        .chat-input:focus { border-color: #ff003c; box-shadow: 0 0 10px rgba(255, 0, 60, 0.3); }

        .file-label, .emoji-trigger {
            background: #121420;
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #00f3ff;
            padding: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(0 0, 80% 0, 100% 20%, 100% 100%, 20% 100%, 0 80%);
        }

        .btn-send {
            background: #ff003c;
            border: none;
            color: #fff;
            padding: 0.85rem 1.8rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            clip-path: polygon(0 0, 85% 0, 100% 30%, 100% 100%, 15% 100%, 0 70%);
        }

        .emoji-picker-bar {
            display: flex;
            gap: 10px;
            padding: 8px 12px;
            background: #0d0e17;
            border: 1px solid rgba(0, 243, 255, 0.2);
            margin-bottom: 8px;
            overflow-x: auto;
        }

        .emoji-item { cursor: pointer; font-size: 1.2rem; transition: transform 0.1s; }
        .emoji-item:hover { transform: scale(1.3); }

        .reply-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 243, 255, 0.1);
            border-left: 3px solid #00f3ff;
            padding: 6px 12px;
            font-size: 0.85rem;
            color: #00f3ff;
            margin-bottom: 8px;
        }

        .friends-container { padding: 2rem; max-width: 650px; }
        .friend-card {
            background: rgba(18, 20, 32, 0.8);
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
            border: 1px solid rgba(0, 243, 255, 0.2);
            clip-path: polygon(0 0, 98% 0, 100% 20%, 100% 100%, 0 100%);
        }

        .btn-action {
            background: #00f3ff;
            color: #05050a;
            border: none;
            padding: 0.6rem 1.2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            clip-path: polygon(0 0, 85% 0, 100% 30%, 100% 100%, 15% 100%, 0 70%);
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        .modal-box {
            background: #0d0e17; padding: 2.2rem; width: 100%; max-width: 420px;
            border: 1px solid #ff003c; box-shadow: 0 0 25px rgba(255, 0, 60, 0.3);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }
    </style>
</head>
<body>

    <div class="icon-bar">
        <div class="nav-icon active" onclick="switchNav('public', this)" title="Public Channels">⚔️</div>
        <div class="nav-icon" onclick="switchNav('dms', this)" title="Direct Messages">📡</div>
        <div class="nav-icon" onclick="switchNav('friends', this)" title="Add Friends">⚡</div>
        <div class="nav-icon settings-btn" onclick="openSettings()" title="Settings">⚙️</div>
    </div>

    <div class="sidebar">
        <div class="brand"><span>⚡</span> PHANTOM // HUB</div>
        
        <div id="sidePublicView">
            <div class="section-title">CHANNELS</div>
            <div class="list-container">
                <div class="item-btn active" onclick="switchChannel('general', this)"># GENERAL</div>

        <div id="sideDmView" class="hidden">
            <div class="section-title">DIRECT FREQUENCIES</div>
            <div class="list-container" id="dmUsersList"></div>
        </div>

        <div class="section-title" style="margin-top:auto;">ACTIVE OPERATIVES (<span id="userCount">0</span>)</div>
        <div class="list-container" id="onlineUsersList" style="max-height: 150px;"></div>

        <div class="user-profile">
            <img id="myAvatar" class="avatar" src="" alt="pfp">
            <div class="user-info">
                <div class="user-name" id="myName">OPERATIVE</div>
                <button class="btn-logout" onclick="logout()">[ DISCONNECT ]</button>

    </div>

    <div class="main-content">
        <div id="chatView" class="view-panel">
            <div class="chat-header">
                <span id="channelHeader"># GENERAL</span>
            </div>
            <div class="messages-box" id="msgBox"></div>
            <div class="typing-indicator" id="typingBox"></div>

            <div class="input-box">
                <!-- Reply Banner -->
                <div id="replyBanner" class="reply-banner hidden">
                    <span id="replyBannerText">Replying to...</span>
                    <button onclick="cancelReply()" style="background:none; border:none; color:#ff003c; cursor:pointer; font-weight:700;">✕</button>
                </div>

                <!-- Cyberpunk Quick Emoji Bar -->
                <div id="emojiPicker" class="emoji-picker-bar hidden">
                    <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                    <span class="emoji-item" onclick="addEmoji('⚔️')">⚔️</span>
                    <span class="emoji-item" onclick="addEmoji('💀')">💀</span>
                    <span class="emoji-item" onclick="addEmoji('⚡')">⚡</span>
                    <span class="emoji-item" onclick="addEmoji('🎯')">🎯</span>
                    <span class="emoji-item" onclick="addEmoji('🤖')">🤖</span>

                </div>

                <form class="chat-form" id="chatForm">
                    <button type="button" class="emoji-trigger" onclick="toggleEmojiBar()">😀</button>
                    <label class="file-label" for="chatFileInput">📎</label>
                    <input type="file" id="chatFileInput" accept="image/*" style="display:none;">
                    <input type="text" id="msgInput" class="chat-input" placeholder="Transmit message..." autocomplete="off">
                    <button type="submit" class="btn-send">TRANSMIT</button>
                </form>
            </div>
        </div>

        <div id="friendsView" class="view-panel hidden">
            <div class="chat-header">OPERATIVE LINK / ADD FRIENDS</div>
            <div class="friends-container">
                <div style="display:flex; gap:0.6rem;">
                    <input type="text" id="friendUsernameInput" class="chat-input" placeholder="Enter operative handle...">
                    <button class="btn-action" onclick="sendFriendRequest()">LINK OPERATIVE</button>
                </div>
                <div id="friendMsg" style="margin-top: 1rem; font-size:0.9rem; color:#00f3ff; font-weight:700;"></div>
                <div class="section-title" style="margin-top: 2rem; padding-left:0;">ESTABLISHED LINKS</div>
                <div id="friendsList"></div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 style="margin-bottom:1.2rem; color:#ff003c; font-family:'Orbitron', sans-serif;">SYSTEM OVERRIDE / SETTINGS</h3>
            <div style="margin-bottom:1.2rem;">
                <label style="font-size:0.8rem; color:#00f3ff; font-weight:700;">NEW HANDLE / NICKNAME</label>
                <input type="text" id="newNickname" class="chat-input" style="width:100%; margin-top:0.4rem;">
            </div>
            <div style="margin-bottom:1.8rem;">
                <label style="font-size:0.8rem; color:#00f3ff; font-weight:700;">AVATAR IMAGE DATA</label>
                <input type="file" id="newPfpFile" accept="image/*" class="chat-input" style="width:100%; margin-top:0.4rem;">
            </div>
            <div style="display:flex; gap:0.8rem; justify-content:flex-end;">
                <button onclick="closeSettings()" style="background:none; border:none; color:#7a8b9e; cursor:pointer; font-weight:700;">ABORT</button>
                <button class="btn-action" onclick="saveSettings()">SAVE OVERRIDE</button>
            </div>
        </div>
    </div>

    <script>
        const savedUser = localStorage.getItem('phantom_user');
        if (!savedUser) window.location.href = "index.html";
        let currentUser = JSON.parse(savedUser);

        function updateProfileUI() {
            document.getElementById('myName').innerText = currentUser.nickname || currentUser.username;
            document.getElementById('myAvatar').src = currentUser.pfp_url || 'https://via.placeholder.com/42/0d0e17/ff003c?text=P';
            document.getElementById('myAvatar').style.border = `2px solid ${getUserColor(currentUser.username)}`;
            document.getElementById('newNickname').value = currentUser.nickname || '';
        }

        const SUPABASE_URL = "https://boxrmxujhzzojepneliq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_iCjgpDWwHTZNqVrKPd44nw_bNx4bciG"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentNav = 'public';
        let currentMode = 'channel';
        let currentTarget = 'general';
        let replyingToMessage = null;

        const msgBox = document.getElementById('msgBox');
        const chatForm = document.getElementById('chatForm');
        const msgInput = document.getElementById('msgInput');
        const chatFileInput = document.getElementById('chatFileInput');
        const channelHeader = document.getElementById('channelHeader');
        const typingBox = document.getElementById('typingBox');

        if ("Notification" in window && Notification.permission === "default") {
            Notification.requestPermission();
        }

        // Unique Color Generator Based on User Key
        function getUserColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash) % 360;
            return `hsl(${h}, 90%, 60%)`; // Dynamic Neon Colors
        }

        updateProfileUI();

        // Louder Tactical Beep Audio Synthesizer
        function playTacticalBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "triangle"; // Sharper frequency
                osc.frequency.setValueAtTime(1050, ctx.currentTime);
                gain.gain.setValueAtTime(0.35, ctx.currentTime); // Louder volume
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch (e) {}
        }

        // Windows Notification ONLY Triggered When AWAY
        function triggerWindowsNotification(title, body) {
            if (document.hidden && "Notification" in window && Notification.permission === "granted") {
                new Notification(title, {
                    body: body,
                    icon: 'https://via.placeholder.com/64/05050a/ff003c?text=HUB'
                });
            }
        }

        function toggleEmojiBar() {
            document.getElementById('emojiPicker').classList.toggle('hidden');
        }

        function addEmoji(emoji) {
            msgInput.value += emoji;
            msgInput.focus();
        }

        function switchNav(nav, el) {
            currentNav = nav;
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('sidePublicView').classList.add('hidden');
            document.getElementById('sideDmView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
            document.getElementById('friendsView').classList.add('hidden');

            if (nav === 'public') {
                document.getElementById('sidePublicView').classList.remove('hidden');
                document.getElementById('chatView').classList.remove('hidden');
                switchChannel('general', document.querySelector('#sidePublicView .item-btn'));
            } else if (nav === 'dms') {
                document.getElementById('sideDmView').classList.remove('hidden');
                document.getElementById('chatView').classList.remove('hidden');
                loadFriendsForDM();
            } else if (nav === 'friends') {
                document.getElementById('friendsView').classList.remove('hidden');
                loadFriendsList();
            }
        }

        async function loadMessages() {
            msgBox.innerHTML = '';
            let query = supabaseClient.from('messages').select('*').order('created_at', { ascending: true });

            if (currentMode === "channel") {
                query = query.eq('channel', currentTarget).is('receiver', null);
            } else {
                query = query.or(`and(username.eq.${currentUser.username},receiver.eq.${currentTarget}),and(username.eq.${currentTarget},receiver.eq.${currentUser.username})`);
            }

            const { data } = await query.limit(50);
            if (data) {
                data.forEach(m => appendMessage(m));
                msgBox.scrollTop = msgBox.scrollHeight;
            }
        }

        function appendMessage(m) {
            const userColor = getUserColor(m.username);
            const name = m.nickname || m.username;
            const pfp = m.pfp_url || 'https://via.placeholder.com/42/0d0e17/ff003c?text=P';
            const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const div = document.createElement('div');
            div.className = 'message-card';
            div.id = `msg-${m.id}`;
            div.style.borderLeft = `3px solid ${userColor}`;

            let replyHTML = m.reply_text ? `<div class="reply-preview-tag">↩ Replying to: ${escapeHtml(m.reply_text)}</div>` : '';
            let imgHTML = m.file_url ? `<img src="${escapeHtml(m.file_url)}" class="msg-img" alt="attachment">` : '';

            let actionsHTML = `
                <div class="msg-actions">
                    <button class="act-btn" onclick="initiateReply('${escapeHtml(name)}', '${escapeHtml(m.message || '')}')">Reply</button>
                    ${m.username === currentUser.username && m.id ? `
                        <button class="act-btn" onclick="editMessage('${m.id}')">Edit</button>
                        <button class="act-btn" style="color:#ff003c;" onclick="deleteMessage('${m.id}')">Delete</button>
                    ` : ''}
                </div>
            `;

            div.innerHTML = `
                ${actionsHTML}
                <img src="${escapeHtml(pfp)}" class="msg-avatar" style="border: 1px solid ${userColor};" alt="pfp">
                <div style="flex:1;">
                    ${replyHTML}
                    <div class="msg-header">
                        <span class="msg-author" style="color: ${userColor};">${escapeHtml(name)}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="msg-body" id="body-${m.id}">${escapeHtml(m.message || '')}</div>
                    ${imgHTML}
                </div>
            `;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function initiateReply(author, text) {
            replyingToMessage = `${author}: ${text}`;
            document.getElementById('replyBannerText').innerText = `Replying to: ${replyingToMessage}`;
            document.getElementById('replyBanner').classList.remove('hidden');
            msgInput.focus();
        }

        function cancelReply() {
            replyingToMessage = null;
            document.getElementById('replyBanner').classList.add('hidden');
        }

        async function deleteMessage(id) {
            if (confirm("Delete this transmission?")) {
                await supabaseClient.from('messages').delete().eq('id', id);
                document.getElementById(`msg-${id}`)?.remove();
            }
        }

        async function editMessage(id) {
            const currentBody = document.getElementById(`body-${id}`).innerText;
            const newText = prompt("Edit your message:", currentBody);
            if (newText && newText !== currentBody) {
                await supabaseClient.from('messages').update({ message: newText }).eq('id', id);
                document.getElementById(`body-${id}`).innerText = newText;
            }
        }

        // Realtime Messages & Updates
        supabaseClient
            .channel('public:messages')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                if (payload.eventType === 'INSERT') {
                    const newMsg = payload.new;
                    if (newMsg.username === currentUser.username) return;

                    let isRelevant = false;
                    if (currentMode === "channel" && newMsg.channel === currentTarget && !newMsg.receiver) isRelevant = true;
                    if (currentMode === "dm" && ((newMsg.username === currentUser.username && newMsg.receiver === currentTarget) || (newMsg.username === currentTarget && newMsg.receiver === currentUser.username))) isRelevant = true;
                    
                    if (isRelevant) appendMessage(newMsg);

                    // ALWAYS Beep sound on every incoming message
                    playTacticalBeep();

                    // Windows Desktop Notification ONLY when away/minimized
                    triggerWindowsNotification(
                        `[PHANTOM HUB] ${newMsg.nickname || newMsg.username}`,
                        newMsg.message || "Sent an attachment"
                    );
                } else if (payload.eventType === 'DELETE') {
                    document.getElementById(`msg-${payload.old.id}`)?.remove();
                } else if (payload.eventType === 'UPDATE') {
                    const bodyEl = document.getElementById(`body-${payload.new.id}`);
                    if (bodyEl) bodyEl.innerText = payload.new.message;
                }
            })
            .subscribe();

        // Typing Indicator Channel
        const typingChannel = supabaseClient.channel('room-typing');
        let remoteTypingTimeout = null;

        typingChannel
            .on('broadcast', { event: 'typing' }, payload => {
                const data = payload.payload;
                if (data.username !== currentUser.username && data.target === currentTarget) {
                    typingBox.innerText = `[!] ${data.nickname.toUpperCase()} IS TRANSMITTING DATA...`;
                    clearTimeout(remoteTypingTimeout);
                    remoteTypingTimeout = setTimeout(() => { typingBox.innerText = ''; }, 2500);
                }
            })
            .subscribe();

        let localTypingTimer = null;
        msgInput.addEventListener('input', () => {
            if (!localTypingTimer) {
                typingChannel.send({
                    type: 'broadcast',
                    event: 'typing',
                    payload: { username: currentUser.username, nickname: currentUser.nickname || currentUser.username, target: currentTarget }
                });
            }
            clearTimeout(localTypingTimer);
            localTypingTimer = setTimeout(() => { localTypingTimer = null; }, 1500);
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            const file = chatFileInput.files[0];
            if (!text && !file) return;

            const activeReply = replyingToMessage;
            cancelReply();
            document.getElementById('emojiPicker').classList.add('hidden');

            msgInput.value = '';
            const tempFile = file;
            chatFileInput.value = '';

            const localMsg = {
                username: currentUser.username,
                nickname: currentUser.nickname,
                pfp_url: currentUser.pfp_url,
                message: text,
                reply_text: activeReply,
                file_url: tempFile ? URL.createObjectURL(tempFile) : null,
                created_at: new Date().toISOString()
            };
            appendMessage(localMsg);

            let file_url = null;
            if (tempFile) {
                const fileName = `chat-${Date.now()}.${tempFile.name.split('.').pop()}`;
                const { data } = await supabaseClient.storage.from('avatars').upload(fileName, tempFile);
                if (data) file_url = supabaseClient.storage.from('avatars').getPublicUrl(fileName).data.publicUrl;
            }

            await supabaseClient.from('messages').insert([{
                username: currentUser.username,
                nickname: currentUser.nickname,
                pfp_url: currentUser.pfp_url,
                message: text,
                reply_text: activeReply,
                file_url: file_url,
                channel: currentMode === "channel" ? currentTarget : "dm",
                receiver: currentMode === "dm" ? currentTarget : null
            }]);
        });

        // Online Presence Tracker
        const presenceChannel = supabaseClient.channel('room-presence', { config: { presence: { key: currentUser.username } } });
        presenceChannel
            .on('presence', { event: 'sync' }, () => {
                const state = presenceChannel.presenceState();
                const list = document.getElementById('onlineUsersList');
                list.innerHTML = '';
                const keys = Object.keys(state);
                document.getElementById('userCount').innerText = keys.length;
                keys.forEach(k => {
                    const u = state[k][0];
                    const div = document.createElement('div');
                    div.className = 'item-btn';
                    div.innerHTML = `<span class="status-dot online"></span> <span style="color:${getUserColor(k)}">${escapeHtml(u.nickname || k)}</span>`;
                    list.appendChild(div);
                });
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await presenceChannel.track({ username: currentUser.username, nickname: currentUser.nickname });
                }
            });

        async function sendFriendRequest() {
            const targetUsername = document.getElementById('friendUsernameInput').value.trim().toLowerCase();
            const msgBox = document.getElementById('friendMsg');
            if (!targetUsername || targetUsername === currentUser.username) {
                msgBox.innerText = "INVALID OPERATIVE HANDLE!";
                return;
            }

            await supabaseClient.from('friends').insert([{ user_a: currentUser.username, user_b: targetUsername, status: 'accepted' }]);
            msgBox.innerText = `LINK ESTABLISHED WITH ${targetUsername.toUpperCase()}`;
            document.getElementById('friendUsernameInput').value = '';
            loadFriendsList();
        }

        async function loadFriendsList() {
            const { data } = await supabaseClient.from('friends').select('*').or(`user_a.eq.${currentUser.username},user_b.eq.${currentUser.username}`);
            const list = document.getElementById('friendsList');
            list.innerHTML = '';

            if (data) {
                data.forEach(f => {
                    const friendUser = f.user_a === currentUser.username ? f.user_b : f.user_a;
                    const div = document.createElement('div');
                    div.className = 'friend-card';
                    div.innerHTML = `<span>👤 <b style="color:${getUserColor(friendUser)}">${escapeHtml(friendUser.toUpperCase())}</b></span> <span style="color:#00f3ff; font-weight:700;">[ LINKED ]</span>`;
                    list.appendChild(div);
                });
            }
        }

        async function loadFriendsForDM() {
            const { data } = await supabaseClient.from('friends').select('*').or(`user_a.eq.${currentUser.username},user_b.eq.${currentUser.username}`);
            const list = document.getElementById('dmUsersList');
            list.innerHTML = '';

            if (data && data.length > 0) {
                data.forEach((f, idx) => {
                    const friendUser = f.user_a === currentUser.username ? f.user_b : f.user_a;
                    const div = document.createElement('div');
                    div.className = `item-btn ${idx === 0 ? 'active' : ''}`;
                    div.innerHTML = `📡 <span style="color:${getUserColor(friendUser)}">${escapeHtml(friendUser.toUpperCase())}</span>`;
                    div.onclick = () => switchDM(friendUser, div);
                    list.appendChild(div);
                });
                switchDM(f.user_a === currentUser.username ? data[0].user_b : data[0].user_a, list.children[0]);
            } else {
                list.innerHTML = `<div style="font-size:0.8rem; color:#7a8b9e; padding:0.5rem;">NO ESTABLISHED LINKS</div>`;
            }
        }

        function switchChannel(channelName, el) {
            currentMode = "channel";
            currentTarget = channelName;
            if (el) {
                document.querySelectorAll('.item-btn').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            channelHeader.innerText = `# ${channelName.toUpperCase()}`;
            loadMessages();
        }

        function switchDM(username, el) {
            currentMode = "dm";
            currentTarget = username;
            if (el) {
                document.querySelectorAll('.item-btn').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            channelHeader.innerText = `📡 ${username.toUpperCase()}`;
            loadMessages();
        }

        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

        async function saveSettings() {
            const newNick = document.getElementById('newNickname').value.trim();
            const file = document.getElementById('newPfpFile').files[0];
            let newPfp = currentUser.pfp_url;

            if (file) {
                const fileName = `${currentUser.username}-${Date.now()}.${file.name.split('.').pop()}`;
                const { data } = await supabaseClient.storage.from('avatars').upload(fileName, file);
                if (data) newPfp = supabaseClient.storage.from('avatars').getPublicUrl(fileName).data.publicUrl;
            }

            currentUser.nickname = newNick || currentUser.username;
            currentUser.pfp_url = newPfp;
            localStorage.setItem('phantom_user', JSON.stringify(currentUser));

            await supabaseClient.from('users').update({ nickname: currentUser.nickname, pfp_url: currentUser.pfp_url }).eq('username', currentUser.username);

            updateProfileUI();
            closeSettings();
        }

        function logout() {
            localStorage.removeItem('phantom_user');
            localStorage.removeItem('phantom_remember');
            window.location.href = "index.html";
        }

        function escapeHtml(text) {
            return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '';
        }

        loadMessages();
    </script>
</body>
</html>
