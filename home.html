<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Hub - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0b0c10; color: #f5f5f7; height: 100vh; display: flex; overflow: hidden; }

        /* Far Left Icon Bar */
        .icon-bar {
            width: 65px;
            background: #08090d;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            gap: 1.2rem;
        }
        .nav-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #121420;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #8b92b6;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .nav-icon:hover, .nav-icon.active {
            background: #5d65ff;
            color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(93, 101, 255, 0.4);
        }
        .nav-icon.settings-btn { margin-top: auto; }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #121420;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }
        .brand {
            padding: 1.25rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #00ffcc;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .section-title {
            font-size: 0.72rem;
            text-transform: uppercase;
            color: #5d65ff;
            padding: 1rem 1rem 0.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .list-container { padding: 0 0.5rem; flex: 1; overflow-y: auto; }
        .item-btn {
            padding: 0.55rem 0.8rem;
            border-radius: 6px;
            color: #8b92b6;
            cursor: pointer;
            margin-bottom: 0.2rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
        }
        .item-btn:hover, .item-btn.active { background: rgba(93, 101, 255, 0.15); color: #00ffcc; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .status-dot.online { background: #00ffcc; box-shadow: 0 0 6px #00ffcc; }

        .user-profile {
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.85rem; font-weight: 600; }
        .btn-logout { background: none; border: none; color: #ff5555; cursor: pointer; font-size: 0.75rem; }

        /* Main Workspace */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #0b0c10; position: relative; }
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 600;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-panel { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 60px); }
        .hidden { display: none !important; }

        /* Messages */
        .messages-box { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        .message-card { display: flex; gap: 0.75rem; align-items: flex-start; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .msg-header { display: flex; gap: 0.5rem; align-items: baseline; }
        .msg-author { font-size: 0.85rem; font-weight: 600; color: #00ffcc; }
        .msg-time { font-size: 0.7rem; color: #8b92b6; }
        .msg-body { font-size: 0.92rem; color: #d0d4e4; margin-top: 0.2rem; word-break: break-word; }
        .msg-img { max-width: 250px; max-height: 200px; border-radius: 8px; margin-top: 0.5rem; display: block; border: 1px solid rgba(255,255,255,0.1); }
        .typing-indicator { font-size: 0.8rem; color: #8b92b6; padding: 0 1.5rem 0.5rem; min-height: 1.2rem; font-style: italic; }

        .input-box { padding: 1rem 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-form { display: flex; gap: 0.5rem; align-items: center; }
        .chat-input {
            flex: 1;
            background: #121420;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #fff;
            outline: none;
        }
        .file-label {
            background: #1a1d2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #00ffcc;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-send {
            background: #5d65ff;
            border: none;
            color: #fff;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Friends Panel */
        .friends-container { padding: 2rem; max-width: 600px; }
        .friend-card {
            background: #121420;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-action {
            background: #00ffcc;
            color: #0b0c10;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Modal Settings */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-box {
            background: #121420;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <!-- Nav Rail -->
    <div class="icon-bar">
        <div class="nav-icon active" onclick="switchNav('public', this)" title="Public Channels">💬</div>
        <div class="nav-icon" onclick="switchNav('dms', this)" title="Direct Messages">✉️</div>
        <div class="nav-icon" onclick="switchNav('friends', this)" title="Add Friends">➕</div>
        <div class="nav-icon settings-btn" onclick="openSettings()" title="Settings">⚙️</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">⚡ PHANTOM</div>
        
        <div id="sidePublicView">
            <div class="section-title">Channels</div>
            <div class="list-container">
                <div class="item-btn active" onclick="switchChannel('general', this)"># general</div>
                <div class="item-btn" onclick="switchChannel('gaming', this)"># gaming</div>
            </div>
        </div>

        <div id="sideDmView" class="hidden">
            <div class="section-title">Direct Messages</div>
            <div class="list-container" id="dmUsersList">
                <!-- Populated dynamically -->
            </div>
        </div>

        <div class="section-title" style="margin-top:auto;">Online (<span id="userCount">0</span>)</div>
        <div class="list-container" id="onlineUsersList" style="max-height: 150px;"></div>

        <div class="user-profile">
            <img id="myAvatar" class="avatar" src="" alt="pfp">
            <div class="user-info">
                <div class="user-name" id="myName">User</div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <!-- Main Section -->
    <div class="main-content">
        
        <!-- CHAT VIEW -->
        <div id="chatView" class="view-panel">
            <div class="chat-header">
                <span id="channelHeader"># general</span>
            </div>
            <div class="messages-box" id="msgBox"></div>
            <div class="typing-indicator" id="typingBox"></div>
            <div class="input-box">
                <form class="chat-form" id="chatForm">
                    <label class="file-label" for="chatFileInput">📎</label>
                    <input type="file" id="chatFileInput" accept="image/*" style="display:none;">
                    <input type="text" id="msgInput" class="chat-input" placeholder="Message..." autocomplete="off">
                    <button type="submit" class="btn-send">Send</button>
                </form>
            </div>
        </div>

        <!-- ADD FRIEND VIEW -->
        <div id="friendsView" class="view-panel hidden">
            <div class="chat-header">Add & Manage Friends</div>
            <div class="friends-container">
                <div style="display:flex; gap:0.5rem;">
                    <input type="text" id="friendUsernameInput" class="chat-input" placeholder="Enter username (e.g. phantom_user)...">
                    <button class="btn-action" onclick="sendFriendRequest()">Send Request</button>
                </div>
                <div id="friendMsg" style="margin-top: 1rem; font-size:0.85rem; color:#00ffcc;"></div>
                
                <div class="section-title" style="margin-top: 2rem; padding-left:0;">Your Friends</div>
                <div id="friendsList"></div>
            </div>
        </div>

    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 style="margin-bottom:1rem; color:#00ffcc;">Account Settings</h3>
            <div style="margin-bottom:1rem;">
                <label style="font-size:0.8rem; color:#8b92b6;">Display Nickname</label>
                <input type="text" id="newNickname" class="chat-input" style="width:100%; margin-top:0.3rem;">
            </div>
            <div style="margin-bottom:1.5rem;">
                <label style="font-size:0.8rem; color:#8b92b6;">New Avatar Image</label>
                <input type="file" id="newPfpFile" accept="image/*" class="chat-input" style="width:100%; margin-top:0.3rem;">
            </div>
            <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                <button onclick="closeSettings()" style="background:none; border:none; color:#8b92b6; cursor:pointer;">Cancel</button>
                <button class="btn-action" onclick="saveSettings()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const savedUser = localStorage.getItem('phantom_user');
        if (!savedUser) window.location.href = "index.html";
        let currentUser = JSON.parse(savedUser);

        function updateProfileUI() {
            document.getElementById('myName').innerText = currentUser.nickname || currentUser.username;
            document.getElementById('myAvatar').src = currentUser.pfp_url || 'https://via.placeholder.com/42/1a1d2e/00ffcc?text=U';
            document.getElementById('newNickname').value = currentUser.nickname || '';
        }
        updateProfileUI();

        const SUPABASE_URL = "https://boxrmxujhzzojepneliq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_iCjgpDWwHTZNqVrKPd44nw_bNx4bciG"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentNav = 'public';
        let currentMode = 'channel';
        let currentTarget = 'general';
        let typingTimeout = null;

        const msgBox = document.getElementById('msgBox');
        const chatForm = document.getElementById('chatForm');
        const msgInput = document.getElementById('msgInput');
        const chatFileInput = document.getElementById('chatFileInput');
        const channelHeader = document.getElementById('channelHeader');
        const typingBox = document.getElementById('typingBox');

        // Nav Switcher
        function switchNav(nav, el) {
            currentNav = nav;
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('sidePublicView').classList.add('hidden');
            document.getElementById('sideDmView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
            document.getElementById('friendsView').classList.add('hidden');

            if (nav === 'public') {
                document.getElementById('sidePublicView').classList.remove('hidden');
                document.getElementById('chatView').classList.remove('hidden');
                switchChannel('general', document.querySelector('#sidePublicView .item-btn'));
            } else if (nav === 'dms') {
                document.getElementById('sideDmView').classList.remove('hidden');
                document.getElementById('chatView').classList.remove('hidden');
                loadFriendsForDM();
            } else if (nav === 'friends') {
                document.getElementById('friendsView').classList.remove('hidden');
                loadFriendsList();
            }
        }

        // Messages Engine
        async function loadMessages() {
            msgBox.innerHTML = '';
            let query = supabaseClient.from('messages').select('*').order('created_at', { ascending: true });

            if (currentMode === "channel") {
                query = query.eq('channel', currentTarget).is('receiver', null);
            } else {
                query = query.or(`and(username.eq.${currentUser.username},receiver.eq.${currentTarget}),and(username.eq.${currentTarget},receiver.eq.${currentUser.username})`);
            }

            const { data } = await query.limit(50);
            if (data) {
                data.forEach(m => appendMessage(m));
                msgBox.scrollTop = msgBox.scrollHeight;
            }
        }

        function appendMessage(m) {
            const name = m.nickname || m.username;
            const pfp = m.pfp_url || 'https://via.placeholder.com/42/1a1d2e/8b92b6?text=U';
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const div = document.createElement('div');
            div.className = 'message-card';
            let imgHTML = m.file_url ? `<img src="${escapeHtml(m.file_url)}" class="msg-img" alt="attachment">` : '';

            div.innerHTML = `
                <img src="${escapeHtml(pfp)}" class="msg-avatar" alt="pfp">
                <div>
                    <div class="msg-header">
                        <span class="msg-author">${escapeHtml(name)}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="msg-body">${escapeHtml(m.message || '')}</div>
                    ${imgHTML}
                </div>
            `;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        // Realtime Messages
        supabaseClient
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const newMsg = payload.new;
                let isRelevant = false;
                if (currentMode === "channel" && newMsg.channel === currentTarget && !newMsg.receiver) isRelevant = true;
                if (currentMode === "dm" && ((newMsg.username === currentUser.username && newMsg.receiver === currentTarget) || (newMsg.username === currentTarget && newMsg.receiver === currentUser.username))) isRelevant = true;
                if (isRelevant) appendMessage(newMsg);
            })
            .subscribe();

        // Send Message
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            const file = chatFileInput.files[0];
            if (!text && !file) return;

            msgInput.value = '';
            chatFileInput.value = '';
            let file_url = null;

            if (file) {
                const fileName = `chat-${Date.now()}.${file.name.split('.').pop()}`;
                const { data } = await supabaseClient.storage.from('avatars').upload(fileName, file);
                if (data) file_url = supabaseClient.storage.from('avatars').getPublicUrl(fileName).data.publicUrl;
            }

            await supabaseClient.from('messages').insert([{
                username: currentUser.username,
                nickname: currentUser.nickname,
                pfp_url: currentUser.pfp_url,
                message: text,
                file_url: file_url,
                channel: currentMode === "channel" ? currentTarget : "dm",
                receiver: currentMode === "dm" ? currentTarget : null
            }]);
        });

        // Presence & Online List
        const presenceChannel = supabaseClient.channel('room-presence', { config: { presence: { key: currentUser.username } } });
        presenceChannel
            .on('presence', { event: 'sync' }, () => {
                const state = presenceChannel.presenceState();
                const list = document.getElementById('onlineUsersList');
                list.innerHTML = '';
                const keys = Object.keys(state);
                document.getElementById('userCount').innerText = keys.length;
                keys.forEach(k => {
                    const u = state[k][0];
                    const div = document.createElement('div');
                    div.className = 'item-btn';
                    div.innerHTML = `<span class="status-dot online"></span> ${escapeHtml(u.nickname || k)}`;
                    list.appendChild(div);
                });
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await presenceChannel.track({ username: currentUser.username, nickname: currentUser.nickname });
                }
            });

        // Friends Engine
        async function sendFriendRequest() {
            const targetUsername = document.getElementById('friendUsernameInput').value.trim().toLowerCase();
            const msgBox = document.getElementById('friendMsg');
            if (!targetUsername || targetUsername === currentUser.username) {
                msgBox.innerText = "Invalid username!";
                return;
            }

            await supabaseClient.from('friends').insert([{ user_a: currentUser.username, user_b: targetUsername, status: 'accepted' }]);
            msgBox.innerText = `Added ${targetUsername} as a friend!`;
            document.getElementById('friendUsernameInput').value = '';
            loadFriendsList();
        }

        async function loadFriendsList() {
            const { data } = await supabaseClient.from('friends').select('*').or(`user_a.eq.${currentUser.username},user_b.eq.${currentUser.username}`);
            const list = document.getElementById('friendsList');
            list.innerHTML = '';

            if (data) {
                data.forEach(f => {
                    const friendUser = f.user_a === currentUser.username ? f.user_b : f.user_a;
                    const div = document.createElement('div');
                    div.className = 'friend-card';
                    div.innerHTML = `<span>👤 <b>${escapeHtml(friendUser)}</b></span> <span style="color:#00ffcc; font-size:0.8rem;">Friend</span>`;
                    list.appendChild(div);
                });
            }
        }

        async function loadFriendsForDM() {
            const { data } = await supabaseClient.from('friends').select('*').or(`user_a.eq.${currentUser.username},user_b.eq.${currentUser.username}`);
            const list = document.getElementById('dmUsersList');
            list.innerHTML = '';

            if (data && data.length > 0) {
                data.forEach((f, idx) => {
                    const friendUser = f.user_a === currentUser.username ? f.user_b : f.user_a;
                    const div = document.createElement('div');
                    div.className = `item-btn ${idx === 0 ? 'active' : ''}`;
                    div.innerHTML = `@ ${escapeHtml(friendUser)}`;
                    div.onclick = () => switchDM(friendUser, div);
                    list.appendChild(div);
                });
                switchDM(f.user_a === currentUser.username ? data[0].user_b : data[0].user_a, list.children[0]);
            } else {
                list.innerHTML = `<div style="font-size:0.8rem; color:#8b92b6; padding:0.5rem;">No friends yet. Add some!</div>`;
            }
        }

        function switchChannel(channelName, el) {
            currentMode = "channel";
            currentTarget = channelName;
            if (el) {
                document.querySelectorAll('.item-btn').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            channelHeader.innerText = `# ${channelName}`;
            loadMessages();
        }

        function switchDM(username, el) {
            currentMode = "dm";
            currentTarget = username;
            if (el) {
                document.querySelectorAll('.item-btn').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            channelHeader.innerText = `@ ${username}`;
            loadMessages();
        }

        // Settings Modals
        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

        async function saveSettings() {
            const newNick = document.getElementById('newNickname').value.trim();
            const file = document.getElementById('newPfpFile').files[0];
            let newPfp = currentUser.pfp_url;

            if (file) {
                const fileName = `${currentUser.username}-${Date.now()}.${file.name.split('.').pop()}`;
                const { data } = await supabaseClient.storage.from('avatars').upload(fileName, file);
                if (data) newPfp = supabaseClient.storage.from('avatars').getPublicUrl(fileName).data.publicUrl;
            }

            currentUser.nickname = newNick || currentUser.username;
            currentUser.pfp_url = newPfp;
            localStorage.setItem('phantom_user', JSON.stringify(currentUser));

            await supabaseClient.from('users').update({ nickname: currentUser.nickname, pfp_url: currentUser.pfp_url }).eq('username', currentUser.username);

            updateProfileUI();
            closeSettings();
        }

        function logout() {
            localStorage.removeItem('phantom_user');
            window.location.href = "index.html";
        }

        function escapeHtml(text) {
            return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '';
        }

        loadMessages();
    </script>
</body>
</html>
