<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM // CENTRAL COMMAND & MATRIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #05050a; }
        ::-webkit-scrollbar-thumb { background: #1a1d2e; border: 1px solid rgba(0, 243, 255, 0.3); }

        body {
            background: #05050a;
            color: #e0e6ed;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(0, 243, 255, 0.04) 0%, transparent 70%),
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .view-container {
            display: none;
            width: 100vw;
            height: 100vh;
        }
        .view-container.active { display: flex; }

        /* --- DASHBOARD VIEW STYLES --- */
        #dashboardView {
            padding: 2rem;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 1rem;
        }
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .matrix-card {
            background: rgba(12, 13, 20, 0.85);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 1.5rem;
            clip-path: polygon(0 0, 97% 0, 100% 3%, 100% 100%, 0 100%);
        }
        .btn-matrix {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.4);
            color: #00f3ff;
            padding: 0.6rem 1.2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-matrix:hover {
            background: #00f3ff;
            color: #05050a;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* --- CHAT HUB VIEW STYLES --- */
        .chat-sidebar {
            width: 280px;
            background: rgba(12, 13, 20, 0.95);
            border-right: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        }
        .back-dashboard-btn {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.4);
            color: #00f3ff;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 900;
            clip-path: polygon(0 0, 80% 0, 100% 20%, 100% 100%, 20% 100%, 0 80%);
            transition: all 0.2s;
        }
        .back-dashboard-btn:hover {
            background: #00f3ff;
            color: #05050a;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        .section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: #7a8b9e;
            margin: 1rem 0 0.4rem 0;
            letter-spacing: 1px;
        }
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            overflow-y: auto;
            flex: 1;
        }
        .channel-item {
            padding: 0.7rem 0.9rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            color: #8a99ad;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 0 100%);
            transition: all 0.2s;
        }
        .channel-item:hover, .channel-item.active {
            color: #00f3ff;
            background: rgba(0, 243, 255, 0.08);
            border-color: rgba(0, 243, 255, 0.3);
            padding-left: 1.1rem;
        }
        .chat-main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(5, 5, 10, 0.6);
        }
        .chat-header-bar {
            height: 60px;
            padding: 0 1.5rem;
            background: rgba(10, 10, 16, 0.9);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-messages-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .msg-bubble {
            background: rgba(12, 13, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.8rem 1rem;
            max-width: 75%;
            clip-path: polygon(0 0, 98% 0, 100% 15%, 100% 100%, 2% 100%, 0 85%);
        }
        .msg-sender {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .msg-text { font-size: 0.95rem; color: #d1d8e0; word-break: break-word; }
        .chat-input-area {
            padding: 1rem 1.5rem;
            background: rgba(10, 10, 16, 0.9);
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            gap: 0.8rem;
        }
        .chat-text-input {
            flex: 1;
            background: #05050a;
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #fff;
            padding: 0.75rem 1rem;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
        }
        .btn-send {
            background: #00f3ff;
            color: #05050a;
            border: none;
            padding: 0 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            clip-path: polygon(0 0, 85% 0, 100% 30%, 100% 100%, 15% 100%, 0 70%);
            transition: all 0.2s;
        }
        .btn-send:hover { background: #ff003c; color: #fff; box-shadow: 0 0 12px rgba(255, 0, 60, 0.5); }
        .chat-right-panel {
            width: 260px;
            background: rgba(10, 10, 16, 0.9);
            border-left: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 1.2rem;
            gap: 0.6rem;
            overflow-y: auto;
        }
        .member-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.9rem;
            font-weight: 700;
        }
        .status-dot { width: 7px; height: 7px; background: #ff003c; transform: rotate(45deg); }
        .status-dot.online { background: #00f3ff; box-shadow: 0 0 8px #00f3ff; }
    </style>
</head>
<body>

    <!-- VIEW 1: DASHBOARD -->
    <div id="dashboardView" class="view-container active">
        <div class="dash-header">
            <h1 style="font-family:'Orbitron',sans-serif; color:#00f3ff; font-size:1.5rem;">PHANTOM // COMMAND DASHBOARD</h1>
            <button class="btn-matrix" onclick="switchView('chat')">LAUNCH CENTRAL CHAT HUB 🚀</button>
        </div>
        
        <div class="matrix-grid">
            <div class="matrix-card">
                <h3 style="font-family:'Orbitron',sans-serif; font-size:0.9rem; color:#00f3ff; margin-bottom:1rem;">CREATE NEW SQUAD (GROUP)</h3>
                <input type="text" id="newGroupName" class="chat-text-input" placeholder="Squad Designation..." style="width:100%; margin-bottom:0.8rem;">
                <label style="font-size:0.8rem; color:#7a8b9e; display:block; margin-bottom:0.3rem;">Upload Squad PFP from PC:</label>
                <input type="file" id="groupAvatarFile" accept="image/*" style="margin-bottom:0.8rem; width:100%; color:#8a99ad; font-size:0.85rem;">
                <button class="btn-matrix" onclick="createGroup()" style="width:100%;">INITIALIZE SQUAD</button>
            </div>
            <div class="matrix-card">
                <h3 style="font-family:'Orbitron',sans-serif; font-size:0.9rem; color:#00f3ff; margin-bottom:1rem;">OPERATIVE IDENTITY</h3>
                <p id="dashUserDisplay" style="font-weight:600; margin-bottom:0.5rem;">Loaded Operative: -</p>
                <p style="font-size:0.85rem; color:#7a8b9e;">All chats, groups, and DMs sync instantly in the unified Matrix hub.</p>
            </div>
        </div>
    </div>

    <!-- VIEW 2: CENTRAL CHAT HUB -->
    <div id="chatView" class="view-container">
        <!-- LEFT CHAT SIDEBAR -->
        <div class="chat-sidebar">
            <div class="sidebar-header">
                <button class="back-dashboard-btn" onclick="switchView('dashboard')" title="Return to Dashboard">🡠</button>
                <span style="font-family:'Orbitron',sans-serif; font-size:0.85rem; font-weight:900; color:#00f3ff;">COMMAND CHAT</span>
            </div>

            <div class="section-label">PUBLIC FREQUENCIES</div>
            <div class="channel-list" id="publicChannelList">
                <div class="channel-item active" onclick="switchActiveChat('global', 'GLOBAL MATRIX', this)">
                    <span>🌐</span> GLOBAL
                </div>
            </div>

            <div class="section-label">ENCRYPTED SQUADS (GROUPS)</div>
            <div class="channel-list" id="groupChannelList"></div>

            <div class="section-label">DIRECT TRANSMISSIONS (DMS)</div>
            <div class="channel-list" id="dmChannelList"></div>
        </div>

        <!-- MAIN CHAT PANEL -->
        <div class="chat-main-panel">
            <div class="chat-header-bar">
                <span id="activeChatTitle" style="font-family:'Orbitron',sans-serif; font-weight:900; color:#00f3ff; font-size:1.1rem;"># GLOBAL MATRIX</span>
                <span id="currentUserTag" style="font-size:0.85rem; color:#7a8b9e; font-weight:700;">-</span>
            </div>

            <div class="chat-messages-container" id="chatMessages"></div>

            <div class="chat-input-area">
                <input type="text" id="messageInput" class="chat-text-input" placeholder="Transmit secure message..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()">TRANSMIT</button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="chat-right-panel" id="rightPanelContent">
            <div style="font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; color:#00f3ff; margin-bottom:0.4rem;">CONNECTED OPERATIVES</div>
            <div id="matrixOnlineList" style="display:flex; flex-direction:column; gap:0.4rem;"></div>
        </div>
    </div>

    <canvas id="colorCanvas" width="20" height="20" style="display:none;"></canvas>

    <script>
        const savedUser = localStorage.getItem('phantom_user');
        if (!savedUser) window.location.href = "index.html";
        let currentUser = JSON.parse(savedUser);

        const SUPABASE_URL = "https://boxrmxujhzzojepneliq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_iCjgpDWwHTZNqVrKPd44nw_bNx4bciG"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentChat = { type: 'global', id: 'global', name: 'GLOBAL MATRIX' };
        let activeSubscription = null;
        let userColorMap = {};

        document.getElementById('dashUserDisplay').innerText = `Loaded Operative: ${(currentUser.nickname || currentUser.username).toUpperCase()}`;
        document.getElementById('currentUserTag').innerText = `OPERATIVE: ${(currentUser.nickname || currentUser.username).toUpperCase()}`;

        function switchView(viewName) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            if (viewName === 'dashboard') {
                document.getElementById('dashboardView').classList.add('active');
            } else {
                document.getElementById('chatView').classList.add('active');
                initChatHub();
            }
        }

        // PFP Color Extraction Logic
        function extractUserColor(username, pfpUrl, callback) {
            if (userColorMap[username]) {
                callback(userColorMap[username]);
                return;
            }
            if (!pfpUrl || pfpUrl.includes('placeholder')) {
                const defaultColor = '#00f3ff';
                userColorMap[username] = defaultColor;
                callback(defaultColor);
                return;
            }

            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = pfpUrl;
            img.onload = () => {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 20, 20);
                const data = ctx.getImageData(0, 0, 20, 20).data;
                let r = 0, g = 0, b = 0, count = 0;
                for (let i = 0; i < data.length; i += 16) {
                    r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                }
                r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);
                const hex = `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
                userColorMap[username] = hex;
                callback(hex);
            };
            img.onerror = () => callback('#00f3ff');
        }

        async function createGroup() {
            const groupName = document.getElementById('newGroupName').value.trim();
            const fileInput = document.getElementById('groupAvatarFile');
            if (!groupName) return alert('Enter a valid squad designation.');

            let avatarUrl = '';
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const filePath = `group_${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage.from('group-avatars').upload(filePath, file);
                if (!uploadError) {
                    const { data: publicURLData } = supabaseClient.storage.from('group-avatars').getPublicUrl(filePath);
                    avatarUrl = publicURLData.publicUrl;
                }
            }

            const { data: newGroup, error } = await supabaseClient.from('groups').insert([{ name: groupName, group_avatar: avatarUrl, created_by: currentUser.username }]).select().single();
            if (error) {
                alert('Error creating group: ' + error.message);
                return;
            }

            await supabaseClient.from('group_members').insert([{ group_id: newGroup.id, username: currentUser.username }]);
            alert('Squad initialized successfully!');
            document.getElementById('newGroupName').value = '';
            fileInput.value = '';
        }

        async function initChatHub() {
            loadSidebarNavs();
            switchActiveChat('global', 'GLOBAL MATRIX', document.querySelector('.channel-item'));
        }

        async function loadSidebarNavs() {
            // Load Groups
            const { data: memberGroups } = await supabaseClient.from('group_members').select('group_id').eq('username', currentUser.username);
            const groupListContainer = document.getElementById('groupChannelList');
            groupListContainer.innerHTML = '';
            
            if (memberGroups && memberGroups.length > 0) {
                const groupIds = memberGroups.map(g => g.group_id);
                const { data: groups } = await supabaseClient.from('groups').select('*').in('id', groupIds);
                if (groups) {
                    groups.forEach(grp => {
                        const div = document.createElement('div');
                        div.className = 'channel-item';
                        div.innerHTML = `<span>👥</span> ${grp.name.toUpperCase()}`;
                        div.onclick = () => switchActiveChat('group', grp.name, div, grp.id);
                        groupListContainer.appendChild(div);
                    });
                }
            }

            // Load DMs
            const { data: friends } = await supabaseClient.from('friends').select('*').or(`user_a.eq.${currentUser.username},user_b.eq.${currentUser.username}`);
            const dmListContainer = document.getElementById('dmChannelList');
            dmListContainer.innerHTML = '';

            if (friends) {
                friends.forEach(f => {
                    const friendUser = f.user_a === currentUser.username ? f.user_b : f.user_a;
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.innerHTML = `<span>📡</span> ${friendUser.toUpperCase()}`;
                    div.onclick = () => switchActiveChat('dm', friendUser, div);
                    dmListContainer.appendChild(div);
                });
            }
        }

        function switchActiveChat(type, name, el, id = null) {
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');

            currentChat = { type, id: id || type, name };
            document.getElementById('activeChatTitle').innerText = type === 'global' ? `# ${name}` : (type === 'group' ? `👥 SQUAD: ${name}` : `📡 DM: ${name.toUpperCase()}`);

            if (activeSubscription) supabaseClient.removeChannel(activeSubscription);

            loadMessages();
            subscribeToMessages();
            renderRightPanel();
        }

        async function loadMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            let query = supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            
            if (currentChat.type === 'global') {
                query = query.is('group_id', null).is('recipient', null);
            } else if (currentChat.type === 'group') {
                query = query.eq('group_id', currentChat.id);
            } else if (currentChat.type === 'dm') {
                query = query.or(`and(sender.eq.${currentUser.username},recipient.eq.${currentChat.name}),and(sender.eq.${currentChat.name},recipient.eq.${currentUser.username})`);
            }

            const { data } = await query;
            if (data) data.forEach(msg => appendMessageNode(msg));
        }

        function subscribeToMessages() {
            activeSubscription = supabaseClient
                .channel(`room-${currentChat.id}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const msg = payload.new;
                    if (currentChat.type === 'global' && !msg.group_id && !msg.recipient) {
                        appendMessageNode(msg);
                    } else if (currentChat.type === 'group' && msg.group_id === currentChat.id) {
                        appendMessageNode(msg);
                    } else if (currentChat.type === 'dm' && ((msg.sender === currentUser.username && msg.recipient === currentChat.name) || (msg.sender === currentChat.name && msg.recipient === currentUser.username))) {
                        appendMessageNode(msg);
                    }
                })
                .subscribe();
        }

        function appendMessageNode(msg) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'msg-bubble';

            extractUserColor(msg.sender, msg.pfp_url, (color) => {
                div.innerHTML = `
                    <div class="msg-sender" style="color: ${color};">${msg.sender.toUpperCase()}</div>
                    <div class="msg-text">${escapeHtml(msg.text)}</div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const payload = {
                sender: currentUser.username,
                text: text,
                pfp_url: currentUser.pfp_url || ''
            };

            if (currentChat.type === 'group') {
                payload.group_id = currentChat.id;
            } else if (currentChat.type === 'dm') {
                payload.recipient = currentChat.name;
            }

            await supabaseClient.from('messages').insert([payload]);
            input.value = '';
        }

        const presenceChannel = supabaseClient.channel('matrix-presence', { config: { presence: { key: currentUser.username } } });
        presenceChannel.on('presence', { event: 'sync' }, () => renderRightPanel()).subscribe(async (status) => {
            if (status === 'SUBSCRIBED') await presenceChannel.track({ username: currentUser.username });
        });

        async function renderRightPanel() {
            const panel = document.getElementById('rightPanelContent');
            panel.innerHTML = '';
            const state = presenceChannel.presenceState();
            const onlineUsernames = Object.keys(state);

            if (currentChat.type === 'group') {
                panel.innerHTML = `<div style="font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; color:#00f3ff; margin-bottom:0.4rem;">SQUAD TELEMETRY</div>`;
                const { data: members } = await supabaseClient.from('group_members').select('username').eq('group_id', currentChat.id);
                if (members) {
                    panel.innerHTML += `<div class="section-label">ONLINE OPERATIVES</div>`;
                    members.forEach(m => {
                        if (onlineUsernames.includes(m.username)) {
                            panel.innerHTML += `<div class="member-row"><span class="status-dot online"></span> <span>${m.username.toUpperCase()}</span></div>`;
                        }
                    });
                    panel.innerHTML += `<div class="section-label">OFFLINE OPERATIVES</div>`;
                    members.forEach(m => {
                        if (!onlineUsernames.includes(m.username)) {
                            panel.innerHTML += `<div class="member-row" style="color:#7a8b9e;"><span class="status-dot"></span> <span>${m.username.toUpperCase()}</span></div>`;
                        }
                    });
                }
            } else {
                panel.innerHTML = `<div style="font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; color:#00f3ff; margin-bottom:0.4rem;">ONLINE OPERATIVES</div>`;
                onlineUsernames.forEach(username => {
                    panel.innerHTML += `<div class="member-row"><span class="status-dot online"></span> <span>${username.toUpperCase()}</span></div>`;
                });
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
