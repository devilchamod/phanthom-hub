<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Hub - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: #0b0c10;
            color: #f5f5f7;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #121420;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ffcc;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #8b92b6;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #8b92b6;
            margin-bottom: 0.4rem;
        }

        .input-field {
            width: 100%;
            background: #1a1d2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #fff;
            outline: none;
            font-size: 0.95rem;
        }

        .input-field:focus {
            border-color: #5d65ff;
        }

        /* Password container with Eye Icon */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            font-size: 1rem;
            user-select: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        /* Checkbox Styling */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #8b92b6;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }

        .remember-me input {
            accent-color: #5d65ff;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background: #5d65ff;
            border: none;
            color: #fff;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #4b52e0;
        }

        .error-msg {
            color: #ff5555;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: #8b92b6;
        }

        .footer-text a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">⚡ PHANTOM HUB</div>
        <div class="subtitle">Welcome back! Please login to continue.</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="usernameInput" class="input-field" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordInput" class="input-field" placeholder="Enter your password" required style="padding-right: 40px;">
                    <span class="toggle-password" id="togglePassword">👁️</span>
                </div>
            </div>

            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn-submit">Log In</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>

        <div class="footer-text">
            Don't have an account? <a href="createacc.html">Create account</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://boxrmxujhzzojepneliq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_iCjgpDWwHTZNqVrKPd44nw_bNx4bciG"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Auto-redirect if "Remember Me" session exists
        const rememberedUser = localStorage.getItem('phantom_user');
        const isRemembered = localStorage.getItem('phantom_remember');

        if (rememberedUser && isRemembered === 'true') {
            window.location.href = "home.html";
        }

        // Toggle Password Visibility
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Form Submission
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.innerText = '';

            const username = document.getElementById('usernameInput').value.trim().toLowerCase();
            const password = passwordInput.value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Fetch user from Supabase
            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', username)
                .single();

            if (error || !data) {
                errorMsg.innerText = 'Username not found!';
                return;
            }

            if (data.password !== password) {
                errorMsg.innerText = 'Incorrect password!';
                return;
            }

            // Save user info in localStorage
            localStorage.setItem('phantom_user', JSON.stringify({
                username: data.username,
                nickname: data.nickname || data.username,
                pfp_url: data.pfp_url
            }));

            // Save remember state
            if (rememberMe) {
                localStorage.setItem('phantom_remember', 'true');
            } else {
                localStorage.removeItem('phantom_remember');
            }

            // Redirect to chat dashboard
            window.location.href = "home.html";
        });
    </script>
</body>
</html>
