<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM // AUTHENTICATION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #05050a;
            color: #e0e6ed;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.08) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            overflow-x: hidden;
        }

        .auth-card {
            background: rgba(12, 13, 20, 0.9);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            clip-path: polygon(0 0, 92% 0, 100% 8%, 100% 100%, 8% 100%, 0 92%);
            backdrop-filter: blur(10px);
            position: relative;
            margin: 1rem;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00f3ff, #ff003c);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #00f3ff;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .brand-header p {
            font-size: 0.85rem;
            color: #7a8b9e;
            letter-spacing: 1px;
            margin-top: 0.3rem;
            font-weight: 600;
        }

        /* Toggle Tabs */
        .tab-group {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            background: transparent;
            border: none;
            color: #7a8b9e;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-btn.active {
            color: #00f3ff;
            border-bottom: 2px solid #00f3ff;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-family: 'Orbitron', sans-serif;
            color: #a0aab5;
            margin-bottom: 0.4rem;
            letter-spacing: 1px;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(5, 5, 10, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.2);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .password-wrapper input {
            padding-right: 2.8rem;
        }

        .toggle-password {
            position: absolute;
            right: 0.8rem;
            background: none;
            border: none;
            color: #00f3ff;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.7;
            transition: opacity 0.2s;
            user-select: none;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .form-group input:focus {
            border-color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* Custom File Input Upload styling */
        .file-upload-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .file-upload-wrapper input[type="file"] {
            display: none;
        }

        .file-upload-label {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(5, 5, 10, 0.8);
            border: 1px dashed rgba(0, 243, 255, 0.4);
            color: #7a8b9e;
            font-size: 0.9rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-upload-label:hover {
            border-color: #00f3ff;
            color: #00f3ff;
            background: rgba(0, 243, 255, 0.05);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            color: #7a8b9e;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input {
            accent-color: #00f3ff;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        /* Primary Action Button */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: #00f3ff;
            color: #05050a;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .btn-submit:hover {
            background: #ff003c;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.6);
        }

        /* Direct Dashboard Hyperlink Box */
        .manual-link-container {
            margin-top: 1.5rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .manual-link-container a {
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .manual-link-container a:hover {
            color: #ff003c;
            text-shadow: 0 0 8px rgba(255, 0, 60, 0.5);
        }

        /* Status Message Box */
        .status-box {
            margin-top: 1rem;
            padding: 0.6rem;
            font-size: 0.8rem;
            text-align: center;
            display: none;
            border-left: 3px solid transparent;
            font-weight: 600;
        }

        .status-box.error {
            display: block;
            background: rgba(255, 0, 60, 0.1);
            color: #ff003c;
            border-color: #ff003c;
        }

        .status-box.success {
            display: block;
            background: rgba(0, 243, 255, 0.1);
            color: #00f3ff;
            border-color: #00f3ff;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-header">
            <h1>⚡ PHANTOM</h1>
            <p>SECURE COMMUNICATIONS NETWORK</p>
        </div>

        <div class="tab-group">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">REGISTER</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" onsubmit="handleAuth(event, 'login')">
            <div class="form-group">
                <label for="loginUser">USERNAME / HANDLE</label>
                <input type="text" id="loginUser" required placeholder="operative_01">
            </div>
            <div class="form-group">
                <label for="loginPass">PASSPHRASE</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPass" required placeholder="••••••••">
                    <button type="button" class="toggle-password" onclick="togglePassVisibility('loginPass', this)">👁️</button>
                </div>
            </div>
            <div class="options-row">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMeLogin" checked>
                    <span>Remember Active Session</span>
                </label>
            </div>
            <button type="submit" class="btn-submit">INITIALIZE LOGIN</button>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" style="display: none;" onsubmit="handleAuth(event, 'register')">
            <div class="form-group">
                <label for="regUser">USERNAME</label>
                <input type="text" id="regUser" required placeholder="cipher_ghost">
            </div>
            <div class="form-group">
                <label for="regNick">DISPLAY NICKNAME</label>
                <input type="text" id="regNick" placeholder="Ghost (Optional)">
            </div>
            <div class="form-group">
                <label for="regPass">PASSPHRASE</label>
                <div class="password-wrapper">
                    <input type="password" id="regPass" required placeholder="••••••••">
                    <button type="button" class="toggle-password" onclick="togglePassVisibility('regPass', this)">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="regPassConfirm">VERIFY PASSPHRASE</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassConfirm" required placeholder="••••••••">
                    <button type="button" class="toggle-password" onclick="togglePassVisibility('regPassConfirm', this)">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label>AVATAR IMAGE (UPLOAD FROM PC)</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="regPfpFile" accept="image/*" onchange="updateFileLabel(this)">
                    <label for="regPfpFile" class="file-upload-label" id="fileLabel">📁 SELECT AVATAR FILE...</label>
                </div>
            </div>
            <div class="options-row">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMeReg" checked>
                    <span>Remember Active Session</span>
                </label>
            </div>
            <button type="submit" class="btn-submit">CREATE OPERATIVE</button>
        </form>

        <!-- MANUAL HYPERLINK TO DASHBOARD -->
        <div class="manual-link-container">
            <a href="dashboard.html">🔗 [ BYPASS LOGIN // OPEN DASHBOARD DIRECTLY ]</a>
        </div>

        <div class="status-box" id="statusBox"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://boxrmxujhzzojepneliq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_iCjgpDWwHTZNqVrKPd44nw_bNx4bciG"; // Ensure this is your public/anon Supabase key
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Auto-redirect if already logged in
        if (localStorage.getItem('phantom_user')) {
            window.location.href = "dashboard.html";
        }

        function togglePassVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btn.innerText = "🙈";
            } else {
                input.type = "password";
                btn.innerText = "👁️";
            }
        }

        function updateFileLabel(input) {
            const label = document.getElementById('fileLabel');
            if (input.files && input.files[0]) {
                label.innerText = `📄 ${input.files[0].name}`;
                label.style.borderColor = "#00f3ff";
                label.style.color = "#00f3ff";
            } else {
                label.innerText = "📁 SELECT AVATAR FILE...";
            }
        }

        function switchTab(mode) {
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabReg = document.getElementById('tabRegister');
            const statusBox = document.getElementById('statusBox');

            statusBox.style.display = 'none';

            if (mode === 'login') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                tabLogin.classList.add('active');
                tabReg.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                tabReg.classList.add('active');
                tabLogin.classList.remove('active');
            }
        }

        function showStatus(msg, isError = true) {
            const statusBox = document.getElementById('statusBox');
            statusBox.innerText = msg;
            statusBox.className = `status-box ${isError ? 'error' : 'success'}`;
        }

        async function handleAuth(event, type) {
            event.preventDefault();

            if (type === 'login') {
                const username = document.getElementById('loginUser').value.trim();
                const password = document.getElementById('loginPass').value;
                const remember = document.getElementById('rememberMeLogin').checked;

                showStatus("Verifying operative credentials...", false);

                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .maybeSingle();

                if (error) {
                    console.error("Login Query Error:", error);
                    showStatus("Database connection error. Check console logs.");
                    return;
                }

                if (!data) {
                    showStatus("Authentication failed. Invalid handle or passphrase.");
                    return;
                }

                localStorage.setItem('phantom_user', JSON.stringify(data));
                if (remember) {
                    localStorage.setItem('phantom_remember', 'true');
                }

                showStatus("Access granted. Redirecting to Command Dashboard...", false);
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 800);

            } else if (type === 'register') {
                const username = document.getElementById('regUser').value.trim();
                const nickname = document.getElementById('regNick').value.trim() || username;
                const password = document.getElementById('regPass').value;
                const confirmPassword = document.getElementById('regPassConfirm').value;
                const fileInput = document.getElementById('regPfpFile');
                const remember = document.getElementById('rememberMeReg').checked;

                if (password !== confirmPassword) {
                    showStatus("Passphrases do not match. Please verify.");
                    return;
                }

                showStatus("Checking handle availability...", false);

                const { data: existing, error: existError } = await supabaseClient
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();

                if (existError) {
                    console.error("Availability Check Error:", existError);
                }

                if (existing) {
                    showStatus("Operative handle already taken.");
                    return;
                }

                let pfp_url = 'https://via.placeholder.com/80/0d0e17/00f3ff?text=P';

                if (fileInput.files && fileInput.files[0]) {
                    showStatus("Uploading avatar file to server...", false);
                    const file = fileInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${username}_${Date.now()}.${fileExt}`;

                    const { error: uploadError } = await supabaseClient.storage
                        .from('avatars')
                        .upload(fileName, file);

                    if (uploadError) {
                        console.error('Upload Error:', uploadError);
                        showStatus("Failed to upload avatar. Ensure 'avatars' storage bucket exists and is public.");
                        return;
                    }

                    const { data: urlData } = supabaseClient.storage
                        .from('avatars')
                        .getPublicUrl(fileName);

                    pfp_url = urlData.publicUrl;
                }

                showStatus("Registering profile...", false);
                const newUser = {
                    username,
                    nickname,
                    password,
                    pfp_url
                };

                const { data, error } = await supabaseClient
                    .from('users')
                    .insert([newUser])
                    .select()
                    .single();

                if (error) {
                    console.error("Registration Insert Error:", error);
                    showStatus(`Failed to create operative profile: ${error.message}`);
                    return;
                }

                localStorage.setItem('phantom_user', JSON.stringify(data));
                if (remember) {
                    localStorage.setItem('phantom_remember', 'true');
                }

                showStatus("Operative profile created! Redirecting to Dashboard...", false);
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 800);
            }
        }
    </script>
</body>
</html>
